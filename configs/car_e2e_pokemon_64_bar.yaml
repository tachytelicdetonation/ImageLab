# Fork B — CVQ x FSQ x BAR @ 64px ("Bit-CAR" / channel-FSQ-AR).
#
# NOT EOSTok-faithful by design: this swaps the discretizer and the AR head to attack the
# data-starved generation gap (1-of-16384 softmax -> bit prediction). Run it ALONGSIDE the
# faithful Fork A baseline (car_e2e_pokemon_64_fast.yaml), not as a replacement. See IDEAS.md D3.
#
# Changes vs Fork A:
#   * quantizer: channel-vector cosine IBQ  ->  channel-wise BINARY FSQ (fsq_bits=14 -> |C|=16384).
#     FSQ is parameter-free: no commitment/codebook/entropy losses, ~100% usage by construction.
#   * head: flat K-way softmax  ->  Masked Bit Modeling (BAR). Predicts each channel's 14 bits
#     via iterative masked refinement; AR loss is bit-CE (O(log K)), not 1-of-16384 CE.
#   * APR off (no soft-codebook decode for the bit head); DINO off to isolate the FSQ+MBM signal.
#
# First milestone is the tokenizer recon go/no-go (set ar_start_step high to see recon alone).

data:
  root: data
  size: 64
  hflip: true
  augment: false

model:
  latent_channels: 256
  codebook_size: 16384            # = 2^fsq_bits (FSQ derives its own; kept for reference/CAR vocab)
  commitment_beta: 0.25           # unused by FSQ
  quant_type: fsq                 # <-- Fork B: channel-wise FSQ instead of IBQ
  fsq_bits: 14                    # binary FSQ: levels=[2]*14 -> |C|=16384, k=14 bits/channel
  enc_ch: 128
  enc_ch_mult: [1, 2, 4]          # 64 -> 16 (f=4); grid 16x16, token_dim=256
  decoder_ch: 128
  decoder_ch_mult: [1, 2, 4]
  decoder_res_blocks: 2
  qwen_name: Qwen/Qwen3-0.6B
  freeze_backbone: false
  attn_impl: sdpa
  head_type: mbm                  # <-- Fork B: masked-bit-modeling head (BAR)
  mbm_depth: 2                    # MBM AdaLN ResBlocks (small head; raise for capacity)
  mbm_infer_steps: 4              # bit-unmask schedule rounds (alloc auto -> [3,3,4,4] for k=14)
  dino_name: facebook/dinov2-large
  max_text_len: 16
  sample_prompts: [pikachu, charizard, bulbasaur, mewtwo, rayquaza mega, gengar, eevee, snorlax]
  temperature: 1.0
  top_k: 0
  cfg_scale: 1.0

loss:
  recon_loss_type: l2
  perceptual_weight: 1.0
  codebook_weight: 1.0
  disc_weight: 1.0
  disc_loss: hinge
  lpips_net: vgg
  gan_eta: 0.05

train:
  device: cuda
  amp: bf16
  batch_size: 16                  # MBM head runs on B*C tokens/step; 16*256=4096 -> keep modest
  grad_accum: 1
  epochs: 50
  lr: 1.0e-4
  car_lr: 5.0e-5
  beta1: 0.5
  beta2: 0.9
  weight_decay: 1.0e-4
  warmup_steps: 150
  grad_clip: 1.0
  disc_start_step: 400
  ar_start_step: 300              # let the FSQ tokenizer settle before the AR chases its indices
  cond_dropout_prob: 0.1          # EOSTok Table 9 (kept; enables CFG via MBM generate_cfg)
  lambda_ntp: 1.0                 # bit-CE is the primary AR objective here (APR is off)
  lambda_apr: 0.0                 # no soft-codebook APR for the bit head
  apr_lpips_weight: 0.0
  lambda_sem: 0.0                 # DINO off to isolate FSQ+MBM (turn on later as a regularizer)
  nested_dropout_prob: 0.25
  channel_weight_schedule: uniform  # flat (MBM ignores channel weights anyway)
  channel_weight_alpha: 1.0
  log_every: 50
  sample_every: 250
  ckpt_every: 500
  num_workers: 8
  seed: 0

wandb:
  enabled: true
  project: cvq-pokemon
  entity: null
  name: e2e-barfsq-mbm-64px-fsq14bit
  mode: online

out:
  ckpt_dir: checkpoints_e2e_64_bar
  sample_dir: samples_e2e_64_bar
