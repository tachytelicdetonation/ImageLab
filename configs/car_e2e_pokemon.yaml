# END-TO-END EOSTok x CAR: joint tokenizer + autoregressive text-to-image, trained together.
#
# This is EOSTok's objective (arXiv:2605.00503) on our channel-wise stack:
#     L_E2E = L_VQVAE + lambda_NTP * L_NTP_weighted + lambda_APR * L_APR_prefix
#                                                 + lambda_sem * L_implicit
# The tokenizer is TRAINABLE and learns jointly with the CAR (NOT the staged frozen-tokenizer
# baseline in train_car.py). APR decodes the CAR's soft teacher-forced prediction back to pixels,
# so generation feedback flows into the tokenizer codebook + decoder.
#
# Four couplings beyond plain CVQ+EOSTok, since this is the union not the sum of the two papers:
#   1. NTP is channel-weighted (early > late) so the AR is told CVQ's prefix matters more.
#   2. APR decodes after nested.apply(c_keep) so the AR's PREFIX is supervised to be
#      sufficient for a coarse reconstruction — mirrors what nested dropout teaches the
#      tokenizer decoder, only now applied to the AR's own predictions.
#   3. CFG: cond_dropout_prob=0.1 trains the unconditional path so cfg_scale>1 can be used.
#   4. IBQ cosine softmax sharpened (tau=0.07, CLIP-style) so K=16384 isn't degenerate.
#
# `lambda_sem` was 1.0 (10x lambda_ntp) -> the encoder was being pulled toward DINOv2's
# geometry an order of magnitude harder than toward AR-predictability. Now 0.3.

data:
  root: data
  size: 256
  hflip: true

model:
  # --- tokenizer arch (channel-wise IBQ, cosine, K=16384) ---
  latent_channels: 256
  codebook_size: 16384            # user-requested: full IBQ-native codebook
  commitment_beta: 0.25
  quantizer_kwargs:
    ibq_l2_norm: true             # EOSTok cosine logits
    ibq_tau: 0.07                 # CLIP-style sharpening: cosine in [-1,1] / 0.07 spans ~30 nats,
                                  # so a K=16384 softmax can actually become peaked. The old
                                  # tau=1.0 left the softmax near-uniform (degenerate IBQ).
    ibq_entropy_weight: 0.01      # EOSTok Table 9 (was 0.05)
    ibq_reg_weight: 1.0
    ibq_entropy_temperature: 0.01
  enc_ch: 128
  enc_ch_mult: [1, 1, 2, 2, 4]
  decoder_ch: 128
  decoder_ch_mult: [1, 1, 2, 2, 4]
  decoder_res_blocks: 2
  # --- CAR backbone ---
  qwen_name: Qwen/Qwen3-0.6B      # normal 0.6B (instruct), plain attention -> fast on this box.
                                  # Qwen3.5-0.8B deferred (linear-attn ~23min/step, no sm_120 kernels).
  freeze_backbone: false
  attn_impl: sdpa
  dino_name: facebook/dinov2-large  # DINOv2 ViT-L/14 (verified working). DINOv3 deferred (224px grid fix).
  max_text_len: 16
  sample_prompts: [pikachu, charizard, bulbasaur, mewtwo, rayquaza mega, gengar, eevee, snorlax]
  temperature: 1.0
  top_k: 0
  cfg_scale: 1.0                  # primary EOSTok-faithful sampling. Try 1.5–3 once trained.

loss:
  recon_loss_type: l2
  perceptual_weight: 1.0
  codebook_weight: 1.0
  disc_weight: 1.0
  disc_loss: hinge
  lpips_net: vgg
  gan_eta: 0.05

train:
  device: cuda
  amp: bf16
  batch_size: 8                   # smaller: tokenizer + 0.6B CAR + APR decode share one GPU
  grad_accum: 4                   # effective batch 32
  epochs: 300
  lr: 1.0e-4                      # tokenizer lr
  car_lr: 5.0e-5                  # CAR (Qwen) lr, lower than the fresh tokenizer head
  beta1: 0.5
  beta2: 0.9
  weight_decay: 1.0e-4
  warmup_steps: 2000
  grad_clip: 1.0
  disc_start_step: 2000           # GAN turn-on (tokenizer fidelity)
  ar_start_step: 0                # PURE EOSTok: NTP+APR joint from step 0 (no warmup), per paper
  lambda_ntp: 0.1                 # EOSTok Table 9
  lambda_apr: 1.0                 # EOSTok L_APR weight (the generative-feedback keystone; ablation-best)
  apr_lpips_weight: 1.0           # EOSTok: L_APR = L2 + LPIPS
  lambda_sem: 0.3                 # Was 1.0 -> outpulled NTP (0.1) by 10x. 0.3 keeps DINOv2 a
                                  # regularizer without dominating AR-predictability.
  nested_dropout_prob: 0.25
  cond_dropout_prob: 0.1          # CFG prerequisite: ~10% caption->empty drop, per sample.
                                  # Without this, cfg_scale>1 at inference is garbage.
  channel_weight_schedule: linear # uniform | linear | sqrt | exp.  Couples CVQ's coarse->fine
                                  # channel ordering to EOSTok's NTP+APR. mean(w)=1 keeps the
                                  # overall loss scale unchanged -- lambda_ntp/_apr untouched.
  channel_weight_alpha: 1.5       # linear: alpha=1.5 -> 3:1 first/last ratio (the recommended
                                  # gentle coupling). alpha=2 silences the last channel. alpha=1
                                  # is uniform. Also used by exp (alpha=1 -> ~2.7:1).
  log_every: 50
  sample_every: 500
  ckpt_every: 1000
  num_workers: 4
  seed: 0

wandb:
  enabled: true
  project: cvq-pokemon
  entity: null
  name: e2e-cvqxeostok-cw-linear-cfg0.1-tau0.07-sem0.3
  mode: online

out:
  ckpt_dir: checkpoints_e2e_dinov2
  sample_dir: samples_e2e_dinov2
