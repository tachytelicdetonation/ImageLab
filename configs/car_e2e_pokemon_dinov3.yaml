# END-TO-END EOSTok x CAR: joint tokenizer + autoregressive text-to-image, trained together.
# DINOv3 variant — patch-16 ViT-L/16 alignment instead of DINOv2's patch-14. Otherwise IDENTICAL
# to car_e2e_pokemon.yaml (same four CVQxEOSTok couplings: channel-weighted NTP, APR prefix-
# truncation, CFG dropout 0.1, sharpened cosine IBQ at tau=0.07).
#
# This is EOSTok's objective (arXiv:2605.00503) on our channel-wise stack:
#     L_E2E = L_VQVAE + lambda_NTP * L_NTP_weighted + lambda_APR * L_APR_prefix
#                                                 + lambda_sem * L_implicit
# The tokenizer is TRAINABLE and learns jointly with the CAR (NOT the staged frozen-tokenizer
# baseline in train_car.py). APR decodes the CAR's soft teacher-forced prediction back to pixels,
# so generation feedback flows into the tokenizer codebook + decoder.
#
# DEFERRED: DINOv3 patch-16 @ 224px yields 14x14=196 patch + CLS + 4 register = 201 tokens.
# cvq/models/dino_align.py takes the last grid*grid tokens; needs patch-count math fix before
# this config will run. See FUTURE_WORK.md.

data:
  root: data
  size: 256
  hflip: true

model:
  # --- tokenizer arch (channel-wise IBQ, cosine, K=16384) ---
  latent_channels: 256
  codebook_size: 16384            # user-requested: full IBQ-native codebook
  commitment_beta: 0.25
  quantizer_kwargs:
    ibq_l2_norm: true             # EOSTok cosine logits
    ibq_tau: 0.07                 # CLIP-style sharpening: K=16384 cosine softmax can now peak.
    ibq_entropy_weight: 0.01      # EOSTok Table 9 (was 0.05)
    ibq_reg_weight: 1.0
    ibq_entropy_temperature: 0.01
  enc_ch: 128
  enc_ch_mult: [1, 1, 2, 2, 4]
  decoder_ch: 128
  decoder_ch_mult: [1, 1, 2, 2, 4]
  decoder_res_blocks: 2
  # --- CAR backbone ---
  qwen_name: Qwen/Qwen3-0.6B-Base # plain-attn transformer; Qwen3.5-0.8B is ~23min/step on this box
                                  # (Blackwell sm_120 has no linear-attn fast-path kernels) -> deferred.
  freeze_backbone: false
  attn_impl: sdpa
  dino_name: facebook/dinov3-vitl16-pretrain-lvd1689m  # DINOv3 ViT-L/16 (hidden 1024, patch16 -> exact
  # 16x16 grid match at native 256px, no interpolation). GATED: needs HF_TOKEN + license acceptance.
  max_text_len: 16
  sample_prompts: [pikachu, charizard, bulbasaur, mewtwo, rayquaza mega, gengar, eevee, snorlax]
  temperature: 1.0
  top_k: 0
  cfg_scale: 1.0

loss:
  recon_loss_type: l2
  perceptual_weight: 1.0
  codebook_weight: 1.0
  disc_weight: 1.0
  disc_loss: hinge
  lpips_net: vgg
  gan_eta: 0.05

train:
  device: cuda
  amp: bf16
  batch_size: 8                   # smaller: tokenizer + 0.6B CAR + APR decode share one GPU
  grad_accum: 4                   # effective batch 32
  epochs: 300
  lr: 1.0e-4                      # tokenizer lr
  car_lr: 5.0e-5                  # CAR (Qwen) lr, lower than the fresh tokenizer head
  beta1: 0.5
  beta2: 0.9
  weight_decay: 1.0e-4
  warmup_steps: 2000
  grad_clip: 1.0
  disc_start_step: 2000           # GAN turn-on (tokenizer fidelity)
  ar_start_step: 0                # PURE EOSTok: NTP+APR joint from step 0 (no warmup), per paper
  lambda_ntp: 0.1                 # EOSTok Table 9
  lambda_apr: 1.0                 # EOSTok L_APR weight (the generative-feedback keystone; ablation-best)
  apr_lpips_weight: 1.0           # EOSTok: L_APR = L2 + LPIPS
  lambda_sem: 0.3                 # Was 1.0 -> outpulled NTP (0.1) by 10x. 0.3 keeps DINO a regularizer.
  nested_dropout_prob: 0.25
  cond_dropout_prob: 0.1          # CFG prerequisite: ~10% caption->empty drop, per sample.
  channel_weight_schedule: linear # CVQ coarse->fine coupled to EOSTok NTP+APR (mean(w)=1).
  channel_weight_alpha: 1.5       # linear alpha=1.5 -> 3:1 first/last channel ratio.
  log_every: 50
  sample_every: 500
  ckpt_every: 1000
  num_workers: 8
  seed: 0

wandb:
  enabled: true
  project: cvq-pokemon
  entity: null
  name: e2e-cvqxeostok-dinov3-cw-linear-cfg0.1-tau0.07-sem0.3
  mode: online

out:
  ckpt_dir: checkpoints_e2e_dinov3
  sample_dir: samples_e2e_dinov3
